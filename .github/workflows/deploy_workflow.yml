# Simple workflow for deploying static content to AWS S3
name: Deploy Home-Page content to Cloud_Storage

on:
  # Runs on pushes targeting the default branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  PROJECT_NAME: "professional-summary"
  AWS_S3_BUCKET: "www.renesantospro"
  AWS_REGION: "us-east-1" # Altere se seu bucket estiver em outra região

jobs:
  # workflow that build the docs and synk with cloud_storage
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      # set up python version
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    
    - name: Install Python dependencies
      # install Python dependencies from requirements.txt needed to this worflow automation
      run: |
        python -m pip install --upgrade pip
        pip install -r ./requirements.txt
    
    - name: Build the docs
      # build site artifacts from docs folder, with mkdocs app 
      run: |
        mkdocs build
  
    - name: load files artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}
        path: ./site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: download files artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}
          path: ./site

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Upload files to AWS S3
        run: |
          aws s3 sync ./site s3://${{ env.AWS_S3_BUCKET }} --delete